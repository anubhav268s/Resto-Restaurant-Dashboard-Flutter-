name: Resto CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: Build Android APK
  # ==========================================
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # <-- Updated to v4

      - name: Setup Java
        uses: actions/setup-java@v4 # <-- Updated to v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4 # <-- Updated to v4
        with:
          name: resto-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ==========================================
  # JOB 2: Build iOS App
  # ==========================================
  build_ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # <-- Updated to v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
        
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign